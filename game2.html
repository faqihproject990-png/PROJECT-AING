<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Birthday Memory Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #ffd6ec 0%, #e8c5d9 50%, #d4a5c2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #8b6f7d;
            font-size: 2.5em;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #a88896;
            font-size: 1.1em;
            font-weight: 300;
            font-style: italic;
        }

        .game-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #ffd6ec, #f5e6ee);
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            color: #8b6f7d;
            font-weight: 600;
        }

        .stat-label {
            font-size: 0.9em;
            color: #a88896;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .card.flip {
            transform: rotateY(180deg);
        }

        .card.matched {
            opacity: 0.7;
            pointer-events: none;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .card-front {
            background: linear-gradient(135deg, #ffd6ec, #f0c9e0);
            border: 2px solid #e8b8d5;
        }

        .card-back {
            background: linear-gradient(135deg, #fff, #fef9fc);
            transform: rotateY(180deg);
            border: 2px solid #ffd6ec;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #d4a5c2, #b88fa8);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(180, 143, 168, 0.3);
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(180, 143, 168, 0.4);
            background: linear-gradient(135deg, #b88fa8, #d4a5c2);
        }

        button:active {
            transform: translateY(0);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(139, 111, 125, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: linear-gradient(135deg, #fff, #fef9fc);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal h2 {
            color: #8b6f7d;
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .modal p {
            color: #a88896;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 1.8em;
            }

            .game-board {
                gap: 10px;
            }

            .card-face {
                font-size: 2em;
            }

            .stat-value {
                font-size: 1.5em;
            }

            button {
                padding: 12px 25px;
                font-size: 0.9em;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5em;
            }

            .subtitle {
                font-size: 0.9em;
            }

            .game-stats {
                padding: 15px;
            }

            .stat-value {
                font-size: 1.3em;
            }

            .stat-label {
                font-size: 0.8em;
            }

            .card-face {
                font-size: 1.5em;
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ffd6ec;
            position: absolute;
            animation: confetti-fall 3s linear;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        .back-button {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: black;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            z-index: 1000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }

        .back-button:active {
            transform: translateX(-3px);
        }

        .back-icon {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 480px) {
            .back-button {
                top: 20px;
                left: 20px;
                padding: 10px 20px;
                font-size: 14px;
            }

            .back-icon {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
<body>
     <!-- Tombol Back -->
    <a href="utama.html" onclick="window.history.back(); return false;" class="back-button">
        <svg class="back-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        <span>Back</span>
    </a>
    <div class="container">
        <header>
            <h1>Elegant Memory</h1>
            <p class="subtitle">A sophisticated birthday celebration</p>
        </header>

        <div class="game-stats">
            <div class="stat">
                <div class="stat-value" id="moves">0</div>
                <div class="stat-label">Moves</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="matches">0</div>
                <div class="stat-label">Matches</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="timer">0:00</div>
                <div class="stat-label">Time</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="controls">
            <button onclick="initGame()">New Game</button>
            <button onclick="resetGame()">Reset</button>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 Congratulations! 🎉</h2>
            <p id="winMessage"></p>
            <button onclick="closeModal()">Play Again</button>
        </div>
    </div>

    <script>
        const icons = ['🎂', '🎁', '🎈', '🎊', '🌸', '🦋', '💝', '✨'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let startTime = null;
        let timerInterval = null;

        function createCards() {
            const cardPairs = [...icons, ...icons];
            return cardPairs.sort(() => Math.random() - 0.5);
        }

        function initGame() {
            cards = createCards();
            matchedPairs = 0;
            moves = 0;
            flippedCards = [];
            startTime = Date.now();
            
            document.getElementById('moves').textContent = '0';
            document.getElementById('matches').textContent = '0';
            document.getElementById('timer').textContent = '0:00';
            
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            
            cards.forEach((icon, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.icon = icon;
                
                card.innerHTML = `
                    <div class="card-face card-front">
                        <span style="color: #d4a5c2;">♦</span>
                    </div>
                    <div class="card-face card-back">${icon}</div>
                `;
                
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });

            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function flipCard() {
            if (flippedCards.length === 2) return;
            if (this.classList.contains('flip') || this.classList.contains('matched')) return;
            
            this.classList.add('flip');
            flippedCards.push(this);
            
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.icon === card2.dataset.icon;
            
            setTimeout(() => {
                if (isMatch) {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    document.getElementById('matches').textContent = matchedPairs;
                    
                    if (matchedPairs === icons.length) {
                        endGame();
                    }
                } else {
                    card1.classList.remove('flip');
                    card2.classList.remove('flip');
                }
                flippedCards = [];
            }, 800);
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('timer').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function endGame() {
            clearInterval(timerInterval);
            const time = document.getElementById('timer').textContent;
            document.getElementById('winMessage').textContent = 
                `You completed the game in ${moves} moves and ${time}!`;
            document.getElementById('winModal').style.display = 'flex';
            createConfetti();
        }

        function createConfetti() {
            const colors = ['#ffd6ec', '#d4a5c2', '#b88fa8', '#e8c5d9'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 2 + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 50);
            }
        }

        function closeModal() {
            document.getElementById('winModal').style.display = 'none';
            initGame();
        }

        function resetGame() {
            initGame();
        }

        initGame();
    </script>
</body>
</html>
