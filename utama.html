<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Girl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #c96b98 0%, #b85c8a 50%, #a04d7c 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 4px 4px;
            pointer-events: none;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        /* Birthday Girl Tag */
        .birthday-tag {
            position: absolute;
            top: 30px;
            right: 40px;
            background: linear-gradient(135deg, #f5e6ee 0%, #e8d4dd 100%);
            padding: 8px 25px;
            transform: rotate(3deg);
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.2);
            font-family: 'Georgia', serif;
            color: #c96b98;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            border: 2px solid #fff;
            z-index: 10;
        }

        /* Ribbon Decoration */
        .ribbon-left {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 80px;
            height: 100px;
            z-index: 5;
        }

        .ribbon-left::before,
        .ribbon-left::after {
            content: '';
            position: absolute;
            width: 3px;
            background: linear-gradient(to bottom, #d88db8, #c96b98);
            height: 100px;
        }

        .ribbon-left::before {
            left: 30px;
            transform: rotate(-15deg);
        }

        .ribbon-left::after {
            left: 45px;
            transform: rotate(15deg);
        }

        .bow-left {
            position: absolute;
            top: 0;
            left: 25px;
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #d88db8, #c96b98);
            clip-path: polygon(50% 0%, 0% 50%, 50% 100%, 100% 50%);
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        }

        /* Calendar Section */
        .calendar-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin: 120px 20px 30px;
            box-shadow: 5px 5px 20px rgba(0, 0, 0, 0.3);
            transform: rotate(-1deg);
            position: relative;
        }

        .paint-header {
            background: linear-gradient(135deg, #f5c6d9 0%, #e8a8c4 100%);
            padding: 20px;
            border-radius: 50px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .paint-header h1 {
            font-family: 'Brush Script MT', cursive;
            font-size: 48px;
            color: #333;
            margin: 0;
        }

        .paint-header p {
            font-size: 24px;
            color: #666;
            margin-top: 5px;
        }

        .calendar {
            margin: 20px 0;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #666;
            text-align: center;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #999;
            border-radius: 50%;
            position: relative;
        }

        .day.circled {
            color: #333;
            font-weight: bold;
            border: 3px solid #c96b98;
        }

        /* Photo Frames */
        .photo-frame {
            width: 150px;
            height: 180px;
            background: white;
            padding: 10px;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.3);
            position: absolute;
            border: 5px solid #fff;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .frame-top {
            top: -60px;
            right: 20px;
            transform: rotate(5deg);
            z-index: 11;
        }

        /* Scrapbook Items */
        .scrapbook-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
            position: relative;
        }

        .scrap-item {
            position: relative;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.2);
        }

        .scrap-photo {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #f5e6ee, #e8d4dd);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .scrap-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .quote-box {
            background: linear-gradient(135deg, #f5c6d9, #e8a8c4);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-style: italic;
            color: #5a3a4d;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.2);
            margin: 20px 0;
        }

        .sticker {
            position: absolute;
            background: linear-gradient(135deg, #d4a5f5, #b88dd8);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
            transform: rotate(-5deg);
        }

        .pearl-frame {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 20px auto;
            border-radius: 50%;
            padding: 15px;
            background: linear-gradient(135deg, #fff, #f5e6ee);
            box-shadow: 0 0 30px rgba(201, 107, 152, 0.3);
        }

        .pearl-frame::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 10% 10%, white 4px, transparent 4px),
                radial-gradient(circle at 30% 5%, white 5px, transparent 5px),
                radial-gradient(circle at 50% 2%, white 4px, transparent 4px),
                radial-gradient(circle at 70% 5%, white 5px, transparent 5px),
                radial-gradient(circle at 90% 10%, white 4px, transparent 4px),
                radial-gradient(circle at 95% 30%, white 5px, transparent 5px),
                radial-gradient(circle at 98% 50%, white 4px, transparent 4px),
                radial-gradient(circle at 95% 70%, white 5px, transparent 5px),
                radial-gradient(circle at 90% 90%, white 4px, transparent 4px),
                radial-gradient(circle at 70% 95%, white 5px, transparent 5px),
                radial-gradient(circle at 50% 98%, white 4px, transparent 4px),
                radial-gradient(circle at 30% 95%, white 5px, transparent 5px),
                radial-gradient(circle at 10% 90%, white 4px, transparent 4px),
                radial-gradient(circle at 5% 70%, white 5px, transparent 5px),
                radial-gradient(circle at 2% 50%, white 4px, transparent 4px),
                radial-gradient(circle at 5% 30%, white 5px, transparent 5px);
            background-size: 100% 100%;
        }

        .pearl-frame-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #f5e6ee, #e8d4dd);
        }

        .pearl-frame-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .birthday-card {
            background: linear-gradient(135deg, #e8d4f5, #d4a5f5);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.2);
            transform: rotate(2deg);
        }

        .birthday-card h2 {
            color: white;
            font-size: 36px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            font-family: 'Georgia', serif;
        }

        .text-sticker {
            display: inline-block;
            background: linear-gradient(135deg, #f5a8d4, #e88db8);
            padding: 10px 20px;
            margin: 5px;
            color: #5a3a4d;
            font-weight: bold;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
            transform: rotate(-2deg);
        }

        .balloon {
            position: absolute;
            width: 80px;
            height: 100px;
            background: linear-gradient(135deg, rgba(255, 192, 203, 0.6), rgba(255, 182, 193, 0.4));
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: inset -10px -10px 20px rgba(255, 255, 255, 0.3);
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 30px;
            background: rgba(201, 107, 152, 0.3);
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            }

<!-- Ikon Game -->
<div class="game-icon" id="gameIcon">
  <img src="static/assets/icon_game.png" alt="Game Icon">
</div>

<script>
  const icon = document.getElementById("gameIcon");
  let isDragging = false;
  let offsetX, offsetY;

  icon.addEventListener("mousedown", startDrag);
  icon.addEventListener("touchstart", startDrag, { passive: true });

  function startDrag(e) {
    isDragging = true;
    icon.style.cursor = "grabbing";

    const rect = icon.getBoundingClientRect();
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);

    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;

    document.addEventListener("mousemove", onDrag);
    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchmove", onDrag, { passive: false });
    document.addEventListener("touchend", stopDrag);
  }

  function onDrag(e) {
    if (!isDragging) return;

    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);

    let x = clientX - offsetX;
    let y = clientY - offsetY;

    const maxX = window.innerWidth - icon.offsetWidth;
    const maxY = window.innerHeight - icon.offsetHeight;
    x = Math.max(0, Math.min(x, maxX));
    y = Math.max(0, Math.min(y, maxY));

    icon.style.left = `${x}px`;
    icon.style.top = `${y}px`;
    icon.style.right = "auto";
    icon.style.bottom = "auto";
  }

  function stopDrag() {
    isDragging = false;
    icon.style.cursor = "grab";
    document.removeEventListener("mousemove", onDrag);
    document.removeEventListener("mouseup", stopDrag);
    document.removeEventListener("touchmove", onDrag);
    document.removeEventListener("touchend", stopDrag);
  }

  // Klik untuk pindah halaman (tanpa ganggu drag)
  icon.addEventListener("click", function(e) {
    if (!isDragging) {
      window.location.href = "plate-game.html"; // Ganti ke halaman game kamu
    }
  });
</script>
</body>

</html>
