<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayla Salsabilla Rachmadani</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #d88db8 0%, #d88db8 100%);
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
        }

        /* Floating particles background */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite ease-in-out;
        }

        .particle:nth-child(1) {
            width: 80px;
            height: 80px;
            background: rgba(232, 209, 255, 0.3);
            top: 10%;
            left: 15%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            width: 60px;
            height: 60px;
            background: rgba(216, 141, 184, 0.3);
            top: 70%;
            left: 80%;
            animation-delay: 3s;
        }

        .particle:nth-child(3) {
            width: 100px;
            height: 100px;
            background: rgba(232, 209, 255, 0.2);
            top: 50%;
            left: 5%;
            animation-delay: 6s;
        }

        .particle:nth-child(4) {
            width: 70px;
            height: 70px;
            background: rgba(216, 141, 184, 0.25);
            top: 20%;
            left: 85%;
            animation-delay: 9s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.5;
            }

            25% {
                transform: translateY(-30px) translateX(20px) scale(1.1);
                opacity: 0.7;
            }

            50% {
                transform: translateY(-60px) translateX(-20px) scale(0.9);
                opacity: 0.6;
            }

            75% {
                transform: translateY(-30px) translateX(30px) scale(1.05);
                opacity: 0.8;
            }
        }

        .container {
            text-align: center;
            perspective: 1000px;
            z-index: 10;
            padding: 20px;
            max-width: 1200px;
            width: 100%;
        }

        .hello-text {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: #fff;
            font-weight: 300;
            letter-spacing: 5px;
            margin-bottom: 15px;
            opacity: 0;
            animation: slowFadeIn 2.5s ease-out forwards;
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.3);
        }

        @keyframes slowFadeIn {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .name-wrapper {
            display: inline-block;
            position: relative;
        }

        .name-3d {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 700;
            color: #fff;
            text-transform: capitalize;
            letter-spacing: 3px;
            position: relative;
            display: inline-block;
            animation: rotate3d 8s infinite ease-in-out;
            transform-style: preserve-3d;
            text-shadow:
                0 0 8px #d88db8,
                2px 2px 0 #c77da5,
                4px 4px 0 #b66d95,
                0 0 20px #a55d85,
                0 0 40px #a55d85,
                0 0 60px #a55d85,
                0 0 80px #a55d85;
            -webkit-text-stroke: 2px #d88db8;
        }

        @keyframes rotate3d {

            0%,
            100% {
                transform: rotateX(0deg) rotateY(0deg);
            }

            25% {
                transform: rotateX(5deg) rotateY(-5deg);
            }

            50% {
                transform: rotateX(-5deg) rotateY(5deg);
            }

            75% {
                transform: rotateX(5deg) rotateY(5deg);
            }
        }

        .subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.3rem);
            color: #fff;
            margin-top: 20px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInUp 1.5s ease-out 0.5s forwards;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .decorative-line {
            width: clamp(150px, 40vw, 300px);
            height: 2px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            margin: 30px auto;
            opacity: 0;
            animation: fadeInUp 1.5s ease-out 1s forwards;
        }

        .accent-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
            opacity: 0;
            animation: fadeInUp 1.5s ease-out 1.5s forwards;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            animation: pulse 2s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.3s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.7;
            }
        }

        /* Photo Card Styles */
        .photo-section {
            margin-top: 50px;
            opacity: 0;
            animation: fadeInUp 1.5s ease-out 2s forwards;
        }

        .photo-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .photo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.3);
        }

        .photo-placeholder {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #e0c9ff, #d88db8);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            transition: all 0.4s ease;
        }

        .photo-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .photo-text {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 500;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        .photo-hint {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            font-style: italic;
            margin-top: 5px;
        }

        .photo-image {
            width: 100%;
            height: 300px;
            border-radius: 15px;
            object-fit: cover;
            display: none;
            animation: zoomIn 0.6s ease-out;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .photo-card.revealed .photo-placeholder {
            display: none;
        }

        .photo-card.revealed .photo-image {
            display: block;
        }

        .photo-caption {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #d88db8;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.4s ease 0.3s;
        }

        .photo-card.revealed .photo-caption {
            opacity: 1;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .name-3d {
                letter-spacing: 2px;
            }

            .subtitle {
                letter-spacing: 4px;
            }

            .particle {
                display: none;
            }

            .photo-card {
                padding: 30px;
            }

            .photo-placeholder,
            .photo-image {
                height: 250px;
            }
        }

        @media (max-width: 480px) {
            .name-3d {
                letter-spacing: 1px;
            }

            .subtitle {
                letter-spacing: 3px;
            }

            .decorative-line {
                margin: 20px auto;
            }

            .photo-card {
                padding: 20px;
            }

            .photo-placeholder,
            .photo-image {
                height: 200px;
            }

            .photo-icon {
                width: 60px;
                height: 60px;
                font-size: 30px;
            }

            .photo-text {
                font-size: 1rem;
            }
        }

        .back-button {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            z-index: 1000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }

        .back-button:active {
            transform: translateX(-3px);
        }

        .back-icon {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 480px) {
            .back-button {
                top: 20px;
                left: 20px;
                padding: 10px 20px;
                font-size: 14px;
            }

            .back-icon {
                width: 18px;
                height: 18px;
            }
        }
    </style>
    
</head>
